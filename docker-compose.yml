services:
  homelab-index:
    build: .
    image: homelab-index:latest
    container_name: homelab-index
    restart: unless-stopped
    # Match your host user so files the app writes under ./data stay
    # readable/editable/git-diffable outside the container. Find yours
    # with `id -u`/`id -g`; 1000:1000 is the common default on Linux.
    user: "${PUID:-1000}:${PGID:-1000}"
    ports:
      - "8000:8000"
    volumes:
      - homelab-index-data:/data
    environment:
      - HOMELAB_DATA_DIR=/data

  # Optional: MCP server so an AI agent (Claude Code, Claude Desktop, etc.)
  # can search/add/edit/delete services and categories directly. Same auth
  # model as the web app - no auth of its own, so only expose this on a
  # trusted network (e.g. Tailscale), never publicly. Remove this service
  # if you don't want it. See docs/mcp-setup.md.
  homelab-index-mcp:
    build: .
    image: homelab-index:latest
    container_name: homelab-index-mcp
    restart: unless-stopped
    user: "${PUID:-1000}:${PGID:-1000}"
    command: ["python", "-m", "app.mcp_server"]
    healthcheck:
      disable: true
    ports:
      - "8001:8001"
    volumes:
      - homelab-index-data:/data
    environment:
      - HOMELAB_DATA_DIR=/data
      - MCP_PORT=8001

volumes:
  homelab-index-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data
